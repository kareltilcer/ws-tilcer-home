# SPA fallback plus a reverse proxy to the Go backend. home's frontend is
# same-origin (relative /api, websocket to location.host — see src/api/client.ts
# and ws.ts), so Nginx forwards /api and /ws to the backend service and serves
# the static bundle for everything else. This differs from ws-tilcer-fin, whose
# Nginx serves static only and lets the platform proxy the API.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # API → Go backend. No URI part after the host, so the original /api/... path
  # is passed through unchanged. "backend" resolves via docker-compose DNS.
  location /api/ {
    proxy_pass http://backend:7999;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Websocket → Go backend (the HTTP/1.1 upgrade dance; long read timeout so idle
  # live-sync sockets aren't culled).
  location /ws {
    proxy_pass http://backend:7999;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
  }

  # Client-side routing: serve index.html for unknown paths so deep links work.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Aggressive caching for hashed assets; HTML stays fresh.
  location ~* \.(?:js|css|woff2?|svg|png|jpg|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
