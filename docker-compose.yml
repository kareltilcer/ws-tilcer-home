# Offline end-to-end run of the two services on your machine, mirroring the
# ws-tilcer-fin layout: a Go API/websocket backend and an Nginx-served SPA.
#   - backend  : Go API + websocket on http://localhost:7999
#   - frontend : Nginx-served SPA on http://localhost:7001, reverse-proxying
#                /api and /ws to the backend (home's SPA is same-origin).
# Both run with the dev auth bypass and no R2 replication — a smoke test of the
# images and entrypoint, not a real deploy (real deploys go through Coolify).
#
# Build + run:  docker compose up --build
# Then open http://localhost:7001 (you are the fake dev admin; no login).
services:
  backend:
    # API-only image (Go API + websocket); the SPA is the frontend service.
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: tilcer-home-backend:dev
    container_name: tilcer-home-backend
    environment:
      HOME_ENV: ${HOME_ENV:-development}
      HOME_ADDR: ${HOME_ADDR:-:7999}
      HOME_DEV_AUTH_BYPASS: ${HOME_DEV_AUTH_BYPASS:-true}
      HOME_DEV_ACTOR_ROLES: ${HOME_DEV_ACTOR_ROLES:-admin}
      # Real auth — required only when the dev bypass is OFF (i.e. a real Coolify
      # deploy). The defaults below are intentionally NONSENSE so a forgotten
      # override fails loudly: REPLACE both in Coolify's env vars with the auth
      # service URL and the shared BE→BE secret. With the bypass on (local
      # harness) they are ignored, so these placeholders are harmless here.
      AUTH_BASE_URL: ${AUTH_BASE_URL:-https://REPLACE-ME.auth.invalid}
      HOME_AUTH_SERVICE_SECRET: ${HOME_AUTH_SERVICE_SECRET:-REPLACE_ME_shared_auth_secret}
      LITESTREAM_ENABLED: ${LITESTREAM_ENABLED:-false}
      HOME_DB_PATH: ${HOME_DB_PATH:-/data/home.db}
    volumes:
      - home-data:/data
    ports:
      - "7999:7999"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # Vite bakes VITE_* at build time; the Nginx runtime image can't see env.
      args:
        VITE_REAL_AUTH: ${VITE_REAL_AUTH:-false}
        VITE_AUTH_BASE_URL: ${VITE_AUTH_BASE_URL:-}
    image: tilcer-home-frontend:dev
    container_name: tilcer-home-frontend
    ports:
      - "7001:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  home-data:
